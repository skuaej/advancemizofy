name: Build Mizofy Apps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-user:
    name: Build User App
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.9'
        channel: 'stable'
    - name: Install dependencies
      working-directory: user_app
      run: flutter pub get
    - name: Build APK
      working-directory: user_app
      run: flutter build apk --release --no-tree-shake-icons
    - name: Upload User APK
      uses: actions/upload-artifact@v4
      with:
        name: mizofy-user-apk
        path: user_app/build/app/outputs/flutter-apk/app-release.apk

  build-admin:
    name: Build Admin App
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.9'
        channel: 'stable'
    - name: Install dependencies
      working-directory: admin_app
      run: flutter pub get
    - name: Build APK
      working-directory: admin_app
      run: flutter build apk --release --no-tree-shake-icons
    - name: Upload Admin APK
      uses: actions/upload-artifact@v4
      with:
        name: mizofy-admin-apk
        path: admin_app/build/app/outputs/flutter-apk/app-release.apk
