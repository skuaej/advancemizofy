name: Build Mizofy Flutter Apps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Flutter APKs
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Build User App (Flutter)
      run: |
        cd user_app
        flutter pub get
        flutter build apk --release --no-tree-shake-icons --split-per-abi

    - name: Build Admin App (Flutter)
      run: |
        cd admin_app
        flutter pub get
        flutter build apk --release --no-tree-shake-icons

    - name: Upload User APKs
      uses: actions/upload-artifact@v4
      with:
        name: Mizofy-User-APKs
        path: user_app/build/app/outputs/flutter-apk/*.apk

    - name: Upload Admin APKs
      uses: actions/upload-artifact@v4
      with:
        name: Mizofy-Admin-APKs
        path: admin_app/build/app/outputs/flutter-apk/*.apk
