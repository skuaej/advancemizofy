name: Build Android APK
on:
  push:
    branches: [ master ]

jobs:
  build-admin:
    name: Build Admin App APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./_HIDDEN_ADMIN_/mizofy-admin
        run: npm install --legacy-peer-deps

      - name: Generate Android project
        working-directory: ./_HIDDEN_ADMIN_/mizofy-admin
        run: npx expo prebuild --platform android --no-install

      - name: Build APK with Gradle
        working-directory: ./_HIDDEN_ADMIN_/mizofy-admin/android
        run: ./gradlew assembleRelease

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: Hacu-Admin-APK
          path: _HIDDEN_ADMIN_/mizofy-admin/android/app/build/outputs/apk/release/app-release.apk

  build-user:
    name: Build User App APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./mizofy-tv
        run: npm install --legacy-peer-deps

      - name: Generate Android project
        working-directory: ./mizofy-tv
        run: npx expo prebuild --platform android --no-install

      - name: Build APK with Gradle
        working-directory: ./mizofy-tv/android
        run: ./gradlew assembleRelease

      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: Hacu-User-APK
          path: mizofy-tv/android/app/build/outputs/apk/release/app-release.apk

  release:
    name: Create Release
    needs: [build-admin, build-user]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Admin APK
        uses: actions/download-artifact@v4
        with:
          name: Hacu-Admin-APK
          path: ./artifacts/admin

      - name: Download User APK
        uses: actions/download-artifact@v4
        with:
          name: Hacu-User-APK
          path: ./artifacts/user

      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/admin/app-release.apk
            ./artifacts/user/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
